<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Done - Live Loop</title>
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <div class="brand">DONE<span class="brand-dot">●</span><span class="brand-sub">live loop</span></div>
        <div class="mission" id="mission-title">waiting for a mission…</div>
        <div class="right">
          <span class="status" id="mission-status" hidden></span>
          <span class="badge" id="mode-badge" data-mode="connecting">connecting…</span>
          <button class="simulation-button" id="simulate-line-item-failure" type="button" disabled>simulate line-item failure</button>
          <button class="simulation-button" id="simulate-batch-two-decline" type="button" disabled>simulate checkout loop</button>
          <span class="clock" id="clock"></span>
        </div>
      </header>
      <main class="workspace">
        <section class="stage">
          <div id="graph" class="graph" role="img" aria-label="Done decision loop graph"></div>
        </section>
        <aside class="detail-panel" id="detail-panel" aria-live="polite" aria-label="Mission details"></aside>
      </main>
      <footer class="ticker" id="ticker" aria-live="polite"></footer>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>

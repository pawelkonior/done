<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="680" viewBox="0 0 1600 680" role="img" aria-labelledby="hero-title hero-desc">
  <title id="hero-title">Done — voice-first commerce agent</title>
  <desc id="hero-desc">A dark navy brand banner for Done featuring a violet-to-blue check-circle mark, the statement Say it. Done., and three enterprise trust principles.</desc>
  <defs>
    <radialGradient id="background" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(286 264) rotate(27) scale(1140 820)">
      <stop stop-color="#202149"/>
      <stop offset="0.48" stop-color="#0E1127"/>
      <stop offset="1" stop-color="#070914"/>
    </radialGradient>
    <radialGradient id="mark-field" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(306 337) rotate(90) scale(252)">
      <stop stop-color="#342265" stop-opacity="0.82"/>
      <stop offset="0.52" stop-color="#161633" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#0B0D1C" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mark" x1="205" y1="190" x2="835" y2="842" gradientUnits="userSpaceOnUse">
      <stop stop-color="#C691FF"/>
      <stop offset="0.48" stop-color="#9B5CFF"/>
      <stop offset="1" stop-color="#4B7BFF"/>
    </linearGradient>
    <linearGradient id="headline" x1="626" y1="236" x2="1048" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="0.52" stop-color="#F5F0FF"/>
      <stop offset="1" stop-color="#B7C7FF"/>
    </linearGradient>
    <linearGradient id="edge" x1="68" y1="52" x2="1535" y2="628" gradientUnits="userSpaceOnUse">
      <stop stop-color="#9B5CFF" stop-opacity="0.48"/>
      <stop offset="0.34" stop-color="#5964A4" stop-opacity="0.22"/>
      <stop offset="0.76" stop-color="#4B7BFF" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#9B5CFF" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="divider" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#9B5CFF" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#9B5CFF" stop-opacity="0.54"/>
      <stop offset="1" stop-color="#4B7BFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="beam" x1="775" y1="80" x2="1424" y2="650" gradientUnits="userSpaceOnUse">
      <stop stop-color="#9B5CFF" stop-opacity="0.13"/>
      <stop offset="1" stop-color="#4B7BFF" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#A9B6E8" stroke-opacity="0.055"/>
    </pattern>
    <filter id="logo-glow" x="-70%" y="-70%" width="240%" height="240%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#02030A" flood-opacity="0.52"/>
    </filter>
    <clipPath id="frame-clip">
      <rect x="2" y="2" width="1596" height="676" rx="34"/>
    </clipPath>
  </defs>

  <g clip-path="url(#frame-clip)">
    <rect width="1600" height="680" fill="url(#background)"/>
    <rect width="1600" height="680" fill="url(#grid)"/>
    <ellipse cx="1390" cy="85" rx="520" ry="360" fill="#4B7BFF" opacity="0.07" filter="url(#logo-glow)"/>
    <ellipse cx="1130" cy="690" rx="530" ry="260" fill="#9B5CFF" opacity="0.07" filter="url(#logo-glow)"/>
    <path d="M826 44L1558 44L1558 664L1372 664Z" fill="url(#beam)"/>

    <g aria-hidden="true" filter="url(#soft-shadow)">
      <rect x="64" y="62" width="478" height="556" rx="32" fill="#0A0C1A" fill-opacity="0.72" stroke="#A889FF" stroke-opacity="0.2"/>
      <rect x="78" y="76" width="450" height="528" rx="24" fill="none" stroke="#B8C5F5" stroke-opacity="0.055"/>
      <circle cx="306" cy="340" r="250" fill="url(#mark-field)"/>
      <circle cx="306" cy="340" r="160" fill="none" stroke="#9B5CFF" stroke-width="38" opacity="0.24" filter="url(#logo-glow)"/>
      <path d="M707 239A322 322 0 1 0 830 493" transform="translate(50 84) scale(.5)" fill="none" stroke="url(#mark)" stroke-width="72" stroke-linecap="round"/>
      <path d="M326 506L458 640L765 332" transform="translate(50 84) scale(.5)" fill="none" stroke="url(#mark)" stroke-width="86" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="138" cy="176" r="4" fill="#C691FF"/>
      <circle cx="469" cy="462" r="3" fill="#4B7BFF"/>
      <circle cx="448" cy="169" r="2" fill="#FFFFFF" opacity="0.74"/>
      <path d="M112 514H206" stroke="#9B5CFF" stroke-opacity="0.38" stroke-linecap="round"/>
      <path d="M406 148H490" stroke="#4B7BFF" stroke-opacity="0.34" stroke-linecap="round"/>
    </g>

    <rect x="578" y="86" width="1" height="508" fill="url(#divider)"/>

    <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
      <g aria-hidden="true">
        <rect x="626" y="100" width="42" height="4" rx="2" fill="#9B5CFF"/>
        <rect x="674" y="100" width="18" height="4" rx="2" fill="#4B7BFF"/>
      </g>
      <text x="626" y="151" fill="#BFC8EA" font-size="18" font-weight="650" letter-spacing="4">VOICE-FIRST COMMERCE</text>
      <text x="620" y="282" fill="url(#headline)" font-size="126" font-weight="760" letter-spacing="-6">Done</text>
      <text x="626" y="365" fill="#FFFFFF" font-size="54" font-weight="650" letter-spacing="-1.8">Say it. Done.</text>
      <text x="628" y="419" fill="#AEB8DB" font-size="29" font-weight="450" letter-spacing="0.1">Voice-first commerce agent</text>

      <g font-size="18" font-weight="600">
        <g>
          <rect x="626" y="492" width="273" height="62" rx="31" fill="#A678FF" fill-opacity="0.09" stroke="#B98AFF" stroke-opacity="0.34"/>
          <circle cx="659" cy="523" r="12" fill="#9B5CFF" fill-opacity="0.18" stroke="#B98AFF" stroke-opacity="0.58"/>
          <path d="M653.5 523L657.5 527L665 519" fill="none" stroke="#D5B7FF" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
          <text x="682" y="529" fill="#E8DFFF">Deterministic guardrails</text>
        </g>
        <g>
          <rect x="915" y="492" width="238" height="62" rx="31" fill="#7183FF" fill-opacity="0.08" stroke="#7C92FF" stroke-opacity="0.3"/>
          <circle cx="948" cy="523" r="12" fill="#657EFF" fill-opacity="0.17" stroke="#8296FF" stroke-opacity="0.56"/>
          <path d="M942.5 523L946.5 527L954 519" fill="none" stroke="#BFD0FF" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
          <text x="971" y="529" fill="#DCE5FF">Auditable decisions</text>
        </g>
        <g>
          <rect x="1169" y="492" width="271" height="62" rx="31" fill="#5A73F7" fill-opacity="0.08" stroke="#6681FF" stroke-opacity="0.3"/>
          <circle cx="1202" cy="523" r="12" fill="#4B7BFF" fill-opacity="0.17" stroke="#6E8DFF" stroke-opacity="0.58"/>
          <path d="M1196.5 523L1200.5 527L1208 519" fill="none" stroke="#BDD0FF" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
          <text x="1225" y="529" fill="#DCE5FF">Fail-closed execution</text>
        </g>
      </g>
    </g>

    <g aria-hidden="true" opacity="0.54">
      <circle cx="1487" cy="590" r="3" fill="#9B5CFF"/>
      <circle cx="1510" cy="590" r="3" fill="#4B7BFF"/>
      <path d="M1453 590H1469M1528 590H1544" stroke="#7B8BC4" stroke-linecap="round"/>
    </g>
  </g>
  <rect x="2" y="2" width="1596" height="676" rx="34" fill="none" stroke="url(#edge)" stroke-width="4"/>
</svg>
